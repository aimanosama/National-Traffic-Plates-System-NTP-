<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTP App Logo - Formal</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f1f5f9;
      font-family: 'Segoe UI', sans-serif;
    }
    .plate {
      width: 360px;
      border: 4px solid #0f172a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }
    .plate-top {
      background: #0284c7; /* baby blue */
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 16px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .plate-bottom {
      background: #ffffff;
      color: #0f172a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      font-size: 28px;
      font-weight: bold;
      position: relative;
    }
    .divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 8px;
      background: #94a3b8;
      transform: translateX(-50%);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="plate">
    <div class="plate-top">
      <div>EGYPT</div>
      <div>مصر</div>
    </div>
    <div class="plate-bottom">
      <div>NTP</div>
      <div class="divider"></div>
      <div>2025</div>
    </div>
  </div>
</body>
</html>
